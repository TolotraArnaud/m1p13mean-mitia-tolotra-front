<div class="min-vh-100 bg-light d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card shadow border-0 rounded-4">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:56px;height:56px">
                <i class="bi bi-person fs-4"></i>
              </div>
              <h2 class="fw-bold">Connexion</h2>
              <p class="text-muted small">Accédez à votre espace personnel</p>
            </div>

            @if (error) {
              <div class="alert alert-danger alert-dismissible rounded-3 py-2 small" role="alert">
                <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
              </div>
            }

            <form (ngSubmit)="login()" #loginForm="ngForm">
              <div class="mb-3">
                <label class="form-label fw-semibold small">Adresse email</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                  <input
                    type="email"
                    class="form-control border-start-0 ps-0"
                    placeholder="vous@exemple.com"
                    name="email"
                    [(ngModel)]="credentials.email"
                    required
                  />
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold small">Mot de passe</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                  <input
                    type="password"
                    class="form-control border-start-0 ps-0"
                    placeholder="••••••••"
                    name="password"
                    [(ngModel)]="credentials.password"
                    required
                  />
                </div>
              </div>
              <button
                type="submit"
                class="btn btn-primary w-100 py-2 fw-semibold"
                [disabled]="loginForm.invalid || loading"
              >
                @if (loading) {
                  <span class="spinner-border spinner-border-sm me-2"></span>
                }
                Se connecter
              </button>
            </form>

            <hr class="my-4">
            <p class="text-center text-muted small mb-0">
              Pas encore de compte ?
              <a routerLink="/register" class="text-primary fw-semibold text-decoration-none">S'inscrire</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
