<div class="card h-100 border-0 shadow-sm rounded-4 hover-card">
  <div class="card-body p-4">
    <div class="d-flex align-items-center mb-3">
      <div class="shop-avatar bg-primary text-white rounded-3 me-3 d-flex align-items-center justify-content-center fw-bold fs-5"
           style="width:52px;height:52px;flex-shrink:0">
        {{ getInitials() }}
      </div>
      <div class="overflow-hidden">
        <h5 class="card-title mb-0 fw-bold text-truncate">{{ shop.nom }}</h5>
        @if (getCategoryName()) {
          <span class="badge bg-primary-subtle text-primary rounded-pill small">{{ getCategoryName() }}</span>
        }
      </div>
    </div>

    @if (shop.description) {
      <p class="card-text text-muted small mb-3" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
        {{ shop.description }}
      </p>
    }

    <div class="d-flex align-items-center justify-content-between mt-auto">
      @if (getOwnerName()) {
        <small class="text-muted"><i class="bi bi-person me-1"></i>{{ getOwnerName() }}</small>
      }
    </div>
  </div>
  <div class="card-footer bg-transparent border-0 px-4 pb-4 pt-0">
    <a [routerLink]="['/shops', shop._id, 'products']" class="btn btn-outline-primary btn-sm w-100 rounded-3">
      <i class="bi bi-eye me-1"></i>Voir les produits
    </a>
  </div>
</div>
